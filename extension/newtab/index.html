<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AI Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 20vh;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 300;
      margin-bottom: 2rem;
      color: #8888aa;
    }

    #search-container {
      width: 100%;
      max-width: 640px;
      padding: 0 1rem;
    }

    #prompt-input {
      width: 100%;
      padding: 14px 20px;
      font-size: 1rem;
      border: 1px solid #333;
      border-radius: 24px;
      background: #16213e;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.2s;
    }

    #prompt-input:focus {
      border-color: #0f3460;
    }

    #prompt-input::placeholder {
      color: #555;
    }

    #response-container {
      width: 100%;
      max-width: 640px;
      margin-top: 2rem;
      padding: 0 1rem;
    }

    #response {
      display: none;
      padding: 1.2rem 1.5rem;
      background: #16213e;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    #response.visible { display: block; }

    #loading {
      display: none;
      text-align: center;
      color: #555;
      margin-top: 2rem;
    }

    #loading.visible { display: block; }

    #provider-badge {
      position: fixed;
      bottom: 1rem;
      right: 1.5rem;
      font-size: 0.75rem;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>AI Bridge</h1>

  <div id="search-container">
    <input
      type="text"
      id="prompt-input"
      placeholder="Pregunta lo que quieras"
      autofocus
    />
  </div>

  <div id="loading">Consultando...</div>

  <div id="response-container">
    <div id="response"></div>
  </div>

  <div id="provider-badge">gemini</div>

  <script src="newtab.js"></script>
</body>
</html>
